<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>University Dashboard Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* BACKGROUND */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #1e293b);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  color: white;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* TITLE */
h3 {
  text-align: center;
  font-weight: 700;
  margin-bottom: 25px;
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* DROPDOWN */
select {
  background: rgba(230, 133, 133, 0.08);
  color: rgb(11, 10, 10);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 12px;
  border-radius: 12px;
  backdrop-filter: blur(15px);
  transition: 0.3s;
  cursor: pointer;
}

select:hover {
  transform: scale(1.03);
  box-shadow: 0 0 15px rgba(59,130,246,0.4);
}

.table-container {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(25px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  overflow-x: auto;
}

/* TABLE */
table {
  border-radius: 15px;
  overflow: hidden;
  min-width: 100%;
}

/* HEADER */
thead {
  position: sticky;
  top: 0;
  z-index: 2;
  background: linear-gradient(90deg, #3b82f6, #0ea5e9);
  color: white;
  text-transform: uppercase;
  font-size: 13px;
  letter-spacing: 1px;
}

/* CELLS */
th, td {
  padding: 14px !important;
  vertical-align: middle;
}

/* ROW DESIGN */
tbody tr {
  transition: 0.3s ease;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* HOVER EFFECT */
tbody tr:hover {
  background: rgba(59,130,246,0.15);
  transform: scale(1.01);
  box-shadow: 0 0 15px rgba(59,130,246,0.2);
}

/* TABLE TEXT */
td {
  color: #e2e8f0;
}

/* SCROLL BAR */
.table-container::-webkit-scrollbar {
  height: 8px;
}

.table-container::-webkit-scrollbar-thumb {
  background: #3b82f6;
  border-radius: 10px;
}
/* LOADING SPINNER */
.loading {
  text-align: center;
  padding: 20px;
  font-size: 16px;
  color: #93c5fd;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity: 0.4;}
}

/* MOBILE */
@media (max-width: 768px) {
  select {
    width: 100% !important;
  }
}
</style>

</head>

<body class="p-4">

<h3>🎓 UNIVERSITY STUDENT DASHBOARD....</h3>

<!-- DROPDOWN -->
<div class="d-flex justify-content-center mb-3">
  <select id="tableSelect" class="w-25">
    <option value="students">Students</option>
    <option value="fees">Fees</option>
    <option value="classes">Classes</option>
    <option value="courses">Courses</option>
    <option value="instructors">Instructors</option>
    <option value="departments">Departments</option>
    <option value="enrollments">Enrollments</option>
    <option value="attendance">Attendance</option>
    <option value="exams">Exams</option>
    <option value="results">Results</option>
  </select>
</div>

<!-- TABLE CARD -->
<div class="table-container container">
<table class="table text-center align-middle">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>

const BASE_URL = 'https://jubilant-telegram-5gvj4g5xv5q73v7x4-3000.app.github.dev/';

document.getElementById('tableSelect').addEventListener('change', loadTable);

loadTable();

function loadTable() {

  let tableName = document.getElementById('tableSelect').value;

  document.getElementById('tableBody').innerHTML =
    `<tr><td colspan="10" class="loading">Loading data...</td></tr>`;

  fetch(BASE_URL + tableName)
    .then(res => res.json())
    .then(data => {

      if (!data.length) return;

      let cols = Object.keys(data[0]);

      // HEADER
      document.getElementById('tableHead').innerHTML = `
        <tr>
          ${cols.map(c => `<th>${c}</th>`).join('')}
        </tr>
      `;

      // BODY
      document.getElementById('tableBody').innerHTML = data.map(row => `
        <tr>
          ${cols.map(c => `<td>${row[c]}</td>`).join('')}
        </tr>
      `).join('');

    })
    .catch(() => {
      document.getElementById('tableBody').innerHTML =
        `<tr><td>Error loading data</td></tr>`;
    });
}

</script>

</body>
</html>
