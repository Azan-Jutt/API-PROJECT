<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>University Admin Panel Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
}

.container-box{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

.table thead{
  background:#0ea5e9;
  color:white;
}

.modal-content{
  background:#1e293b;
  color:white;
}

input{
  background:#0f172a !important;
  color:white !important;
  border:1px solid #334155 !important;
}

.btn-warning{background:#f59e0b;border:none;}
.btn-danger{background:#ef4444;border:none;}
.btn-success{background:#22c55e;border:none;}

.search-box{width:300px;}
</style>
</head>
<body class="p-4">

<h3 class="text-center mb-4">🎓...UNIVERSITY ADMIN PANNEL...</h3>

<div class="d-flex justify-content-between mb-3">
  <select id="tableSelect" class="form-select w-25"></select>
  <input id="search" class="form-control search-box" placeholder="Search...">
  <button class="btn btn-success" onclick="openAddModal()">+ Add</button>
</div>

<div class="container-box">
  <table class="table table-dark table-hover text-center">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="modal fade" id="formModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5 id="modalTitle">Add Record</h5>
      <div id="formBody"></div>
      <button class="btn btn-primary mt-3" onclick="saveData()">Save</button>
    </div>
  </div>
</div>

<script>
const BASE_URL = 'https://friendly-computing-machine-q7vj976pv9g9fvjp-3000.app.github.dev';

const tables = ['students','fees','classes','courses','instructors','departments','enrollments','attendance','exams','results'];

const schemas = {
  students:['name','email','gender','dob'],
  courses:['course_name','credit_hours'],
  instructors:['name','email'],
  departments:['dept_name'],
  enrollments:['student_id','course_id'],
  attendance:['student_id','course_id','status'],
  exams:['course_id','exam_date'],
  results:['student_id','exam_id','marks'],
  fees:['student_id','amount','status'],
  classes:['course_id','instructor_id']
};

let currentTable='students';
let editId=null;

const thead=document.getElementById('thead');
const tbody=document.getElementById('tbody');
const formBody=document.getElementById('formBody');

/* ---------------- INIT ---------------- */
document.getElementById('tableSelect').innerHTML =
tables.map(t=>`<option value="${t}">${t}</option>`).join('');

document.getElementById('tableSelect').addEventListener('change',e=>{
  currentTable=e.target.value;
  load();
});

document.getElementById('search').addEventListener('input',load);

load();

/* ---------------- LOAD ---------------- */
async function load(){
  const res = await fetch(`${BASE_URL}/${currentTable}`);
  let data = await res.json();

  const search=document.getElementById('search').value.toLowerCase();
  if(search){
    data=data.filter(d=>JSON.stringify(d).toLowerCase().includes(search));
  }

  if(!data.length){
    tbody.innerHTML='<tr><td colspan="100%">No Data</td></tr>';
    return;
  }

  const cols=Object.keys(data[0]);

  thead.innerHTML = `
    <tr>
      ${cols.map(c=>`<th>${c}</th>`).join('')}
      <th>Action</th>
    </tr>
  `;

  tbody.innerHTML = data.map(r=>{
    const idKey = getIdKey(r);

    return `
      <tr>
        ${cols.map(c=>`<td>${r[c]}</td>`).join('')}
        <td>
          <button class="btn btn-warning btn-sm"
            onclick='editRow(${JSON.stringify(r)})'>Edit</button>

          <button class="btn btn-danger btn-sm"
            onclick='deleteRow(${r[idKey]})'>Delete</button>
        </td>
      </tr>
    `;
  }).join('');
}

/* ---------------- ID FINDER ---------------- */
function getIdKey(obj){
  return Object.keys(obj).find(k =>
    k.toLowerCase() === 'id' ||
    k.toLowerCase().endsWith('_id')
  );
}

/* ---------------- ADD ---------------- */
function openAddModal(){
  editId=null;
  buildForm({});
  new bootstrap.Modal(document.getElementById('formModal')).show();
}

/* ---------------- EDIT (FIXED) ---------------- */
function editRow(row){
  // 🔥 FIX: direct object (no decodeURIComponent)
  const data = row;

  editId = getIdKey(data);
  editId = data[editId];

  buildForm(data);

  new bootstrap.Modal(document.getElementById('formModal')).show();
}

/* ---------------- FORM ---------------- */
function buildForm(data){
  const fields = schemas[currentTable] || Object.keys(data);

  formBody.innerHTML = fields.map(f=>`
    <input class="form-control mb-2"
      id="${f}"
      value="${data[f] ?? ''}"
      placeholder="${f}">
  `).join('');
}

/* ---------------- SAVE ---------------- */
async function saveData(){

  let obj = {};
  formBody.querySelectorAll('input').forEach(i=>{
    obj[i.id] = i.value;
  });

  let url = `${BASE_URL}/${currentTable}`;
  let method = 'POST';

  if(editId){
    url += `/${editId}`;
    method = 'PUT';
  }

  const res = await fetch(url,{
    method,
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(obj)
  });

  console.log(await res.json());

  bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();
  load();
}

/* ---------------- DELETE ---------------- */
async function deleteRow(id){
  if(!confirm("Delete this record?")) return;

  await fetch(`${BASE_URL}/${currentTable}/${id}`,{
    method:'DELETE'
  });

  load();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
